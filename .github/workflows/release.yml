name: Installer Build & Release

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.bump.outputs.sha }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          sed -i "s/\$installerVersion = '[^']*';/\$installerVersion = '${NEW_VERSION}';/" backend/index.php
          git add package.json backend/index.php
          git commit -m "chore: bump version to v${NEW_VERSION} [skip ci]"
          git push origin master
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumped to v${NEW_VERSION}"

  build-and-release:
    needs: version-bump
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build-only

      - name: Push assets to dist branch (jsDelivr CDN)
        run: |
          cp -r dist/assets /tmp/installer-assets

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan dist-temp
          git reset --hard
          git clean -fdx

          mkdir -p backend/public/assets
          cp -r /tmp/installer-assets/* backend/public/assets/
          git add -f backend/public/assets/
          git commit -m "assets: v${{ needs.version-bump.outputs.version }}"
          git push origin dist-temp:dist --force

      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.sha }}

      - name: Install dependencies
        run: npm ci

      - name: Build installer package (CDN mode)
        run: npm run package
        env:
          CDN_BASE_URL: https://cdn.jsdelivr.net/gh/${{ github.repository }}@dist/backend/public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-bump.outputs.version }}
          name: "CentralCorp Installer v${{ needs.version-bump.outputs.version }}"
          body: |
            ## CentralCorp Installer v${{ needs.version-bump.outputs.version }}

            ### Téléchargement

            **[Télécharger `installer.zip`](https://github.com/Geoventure-MC/Installer/releases/download/v${{ needs.version-bump.outputs.version }}/installer.zip)**

            ### Comment installer

            1. Télécharge `installer.zip` ci-dessous
            2. Extrais le contenu à la racine de ton site web
            3. Ouvre ton navigateur et navigue vers ton domaine
            4. Suis les étapes affichées par l’installateur

            ### Prérequis serveur

            - PHP 8.2+
            - Extensions : `bcmath` `curl` `fileinfo` `mbstring` `openssl` `PDO` `xml` `zip`
            - Apache avec `mod_rewrite` ou Nginx

            > Besoin d’aide ? Rejoins le [Discord Geoventure](https://discord.gg/VCmNXHvf77)

            ---
          generate_release_notes: true
          append_body: true
          files: installer.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
