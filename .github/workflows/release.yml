name: Installer Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Using version: ${VERSION}"

      - name: Sync version to package.json and backend
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          sed -i "s/\$installerVersion = '[^']*';/\$installerVersion = '${VERSION}';/" backend/index.php

      - name: Install dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Build installer package (self-contained ZIP)
        run: npm run package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "CentralCorp Installer v${{ steps.version.outputs.version }}"
          body: |
            ## CentralCorp Installer v${{ steps.version.outputs.version }}

            Installe ton panel CentralCorp en quelques clics.

            ---

            ### Telecharger

            > [**Telecharger installer.zip**](https://github.com/Geoventure-MC/Installer/releases/download/v${{ steps.version.outputs.version }}/installer.zip)

            ---

            ### Installation en 4 etapes

            1. **Telecharge** le fichier `installer.zip` ci-dessous
            2. **Extrais** son contenu a la racine de ton site web (dossier `www`, `public_html`, `htdocs`...)
            3. **Ouvre** ton domaine dans un navigateur (ex : `https://tonsite.fr`)
            4. **Laisse-toi guider** par l'assistant

            ---

            ### Prerequis serveur

            | Besoin | Detail |
            |--------|--------|
            | **PHP** | version **8.2** ou plus recente |
            | **Extensions** | `bcmath` `curl` `fileinfo` `mbstring` `openssl` `PDO` `xml` `zip` |
            | **Serveur web** | Apache (avec `mod_rewrite`) ou Nginx |

            ---

            ### Besoin d'aide ?

            - La page finale contient un **bouton de diagnostic** qui t'indique ce qui ne va pas
            - Rejoins le [**Discord Geoventure**](https://discord.gg/VCmNXHvf77)
          files: installer.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
